<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>DMARCBridge</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --ink: #0f0f0f; --paper: #f8f6f1; --cream: #f0ede5;
    --accent: #c8522a; --accent-light: #e8d5cc; --muted: #8a8680;
    --border: #e0dbd2; --white: #ffffff; --success: #2d6a4f; --error: #c62828;
  }
  html, body, #root { height: 100%; }
  body { font-family: 'DM Sans', sans-serif; background: var(--paper); color: var(--ink); -webkit-font-smoothing: antialiased; }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(24px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes spin { to { transform: rotate(360deg); } }
  .fade-up { animation: fadeUp 0.6s ease both; }
  .fade-up-1 { animation: fadeUp 0.6s 0.1s ease both; }
  .fade-up-2 { animation: fadeUp 0.6s 0.2s ease both; }
  .fade-up-3 { animation: fadeUp 0.6s 0.3s ease both; }
  .fade-in { animation: fadeIn 0.4s ease both; }
  .btn { display: inline-flex; align-items: center; justify-content: center; gap: 8px; padding: 12px 28px; border-radius: 4px; font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 500; letter-spacing: 0.02em; cursor: pointer; border: none; transition: all 0.2s ease; text-decoration: none; }
  .btn-primary { background: var(--ink); color: var(--white); }
  .btn-primary:hover { background: #2a2a2a; transform: translateY(-1px); box-shadow: 0 4px 16px rgba(0,0,0,0.15); }
  .btn-outline { background: transparent; color: var(--ink); border: 1.5px solid var(--ink); }
  .btn-outline:hover { background: var(--ink); color: var(--white); }
  .btn-accent { background: var(--accent); color: var(--white); }
  .btn-accent:hover { background: #b04620; transform: translateY(-1px); box-shadow: 0 4px 16px rgba(200,82,42,0.3); }
  .btn-google { background: var(--white); color: var(--ink); border: 1.5px solid var(--border); width: 100%; }
  .btn-google:hover { background: var(--cream); border-color: var(--ink); }
  .btn-full { width: 100%; }
  .btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none !important; }
  .spinner { width: 16px; height: 16px; border: 2px solid rgba(255,255,255,0.3); border-top-color: white; border-radius: 50%; animation: spin 0.7s linear infinite; }
  .nav { position: fixed; top: 0; left: 0; right: 0; z-index: 100; display: flex; align-items: center; justify-content: space-between; padding: 0 48px; height: 64px; background: rgba(248,246,241,0.92); backdrop-filter: blur(12px); border-bottom: 1px solid var(--border); }
  .nav-logo { font-family: 'DM Serif Display', serif; font-size: 22px; color: var(--ink); text-decoration: none; display: flex; align-items: center; gap: 10px; }
  .nav-links { display: flex; align-items: center; gap: 32px; }
  .nav-link { font-size: 14px; color: var(--muted); text-decoration: none; transition: color 0.2s; }
  .nav-link:hover { color: var(--ink); }
  .nav-actions { display: flex; align-items: center; gap: 12px; }
  .landing { min-height: 100vh; }
  .hero { padding: 140px 48px 80px; max-width: 1100px; margin: 0 auto; display: grid; grid-template-columns: 1fr 1fr; gap: 80px; align-items: center; }
  .hero-eyebrow { display: inline-flex; align-items: center; gap: 8px; font-size: 12px; font-weight: 500; letter-spacing: 0.12em; text-transform: uppercase; color: var(--accent); margin-bottom: 24px; }
  .hero-eyebrow::before { content: ''; display: block; width: 24px; height: 1.5px; background: var(--accent); }
  .hero-title { font-family: 'DM Serif Display', serif; font-size: clamp(42px, 5vw, 60px); line-height: 1.1; color: var(--ink); margin-bottom: 24px; }
  .hero-title em { font-style: italic; color: var(--accent); }
  .hero-desc { font-size: 17px; line-height: 1.7; color: var(--muted); margin-bottom: 40px; font-weight: 300; }
  .hero-actions { display: flex; gap: 16px; align-items: center; }
  .hero-card { background: var(--white); border: 1px solid var(--border); border-radius: 12px; padding: 24px; box-shadow: 0 8px 40px rgba(0,0,0,0.08); }
  .hero-card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
  .hero-card-title { font-size: 13px; font-weight: 500; color: var(--muted); letter-spacing: 0.05em; text-transform: uppercase; }
  .status-badge { font-size: 11px; font-weight: 500; padding: 4px 10px; border-radius: 100px; background: #e8f5e9; color: var(--success); }
  .domain-row { display: flex; align-items: center; justify-content: space-between; padding: 14px 0; border-bottom: 1px solid var(--border); }
  .domain-row:last-child { border-bottom: none; }
  .domain-name { font-size: 14px; font-weight: 500; }
  .domain-meta { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .score-bar { display: flex; align-items: center; gap: 10px; }
  .score-num { font-size: 13px; font-weight: 600; min-width: 28px; text-align: right; }
  .bar-track { width: 80px; height: 4px; background: var(--cream); border-radius: 2px; }
  .bar-fill { height: 100%; border-radius: 2px; background: var(--success); }
  .bar-fill.warn { background: #f59e0b; }
  .bar-fill.bad { background: var(--error); }
  .floating-stat { position: absolute; background: var(--white); border: 1px solid var(--border); border-radius: 10px; padding: 12px 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
  .floating-stat.top-left { top: -20px; left: -30px; }
  .floating-stat.bottom-right { bottom: -20px; right: -20px; }
  .stat-value { font-family: 'DM Serif Display', serif; font-size: 24px; color: var(--ink); }
  .stat-label { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .features { padding: 80px 48px; background: var(--cream); border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); }
  .features-inner { max-width: 1100px; margin: 0 auto; }
  .section-label { font-size: 12px; font-weight: 500; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); margin-bottom: 48px; display: flex; align-items: center; gap: 12px; }
  .section-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }
  .features-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px; }
  .feature-item { background: var(--white); padding: 36px 32px; transition: box-shadow 0.2s; }
  .feature-item:hover { box-shadow: 0 8px 32px rgba(0,0,0,0.08); z-index: 1; position: relative; }
  .feature-icon { width: 40px; height: 40px; background: var(--accent-light); border-radius: 8px; display: flex; align-items: center; justify-content: center; margin-bottom: 20px; }
  .feature-title { font-size: 16px; font-weight: 600; margin-bottom: 10px; }
  .feature-desc { font-size: 14px; color: var(--muted); line-height: 1.6; font-weight: 300; }
  .cta-section { padding: 100px 48px; text-align: center; background: var(--ink); color: var(--white); }
  .cta-title { font-family: 'DM Serif Display', serif; font-size: 48px; margin-bottom: 16px; }
  .cta-title em { font-style: italic; color: var(--accent-light); }
  .cta-desc { font-size: 16px; color: rgba(255,255,255,0.6); margin-bottom: 40px; font-weight: 300; }
  .btn-cta { background: var(--accent); color: var(--white); font-size: 16px; padding: 16px 40px; }
  .btn-cta:hover { background: #b04620; transform: translateY(-2px); box-shadow: 0 8px 24px rgba(200,82,42,0.4); }
  footer { padding: 32px 48px; border-top: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
  .footer-copy { font-size: 13px; color: var(--muted); }
  .auth-page { min-height: 100vh; display: grid; grid-template-columns: 1fr 1fr; }
  .auth-visual { background: var(--ink); padding: 60px 48px; display: flex; flex-direction: column; justify-content: space-between; position: relative; overflow: hidden; }
  .auth-visual::before { content: ''; position: absolute; top: -100px; right: -100px; width: 400px; height: 400px; background: radial-gradient(circle, rgba(200,82,42,0.2) 0%, transparent 70%); pointer-events: none; }
  .auth-visual-logo { font-family: 'DM Serif Display', serif; font-size: 26px; color: var(--white); display: flex; align-items: center; gap: 12px; text-decoration: none; }
  .auth-visual-logo-mark { width: 36px; height: 36px; background: var(--accent); border-radius: 8px; display: flex; align-items: center; justify-content: center; }
  .auth-quote { color: rgba(255,255,255,0.9); }
  .auth-quote-text { font-family: 'DM Serif Display', serif; font-size: 28px; line-height: 1.4; margin-bottom: 16px; }
  .auth-quote-text em { font-style: italic; color: var(--accent-light); }
  .auth-quote-sub { font-size: 14px; color: rgba(255,255,255,0.5); font-weight: 300; }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: rgba(255,255,255,0.2); }
  .dot.active { background: var(--accent); }
  .auth-form-panel { display: flex; flex-direction: column; justify-content: center; padding: 60px 64px; background: var(--paper); }
  .auth-form-inner { max-width: 400px; width: 100%; }
  .auth-form-header { margin-bottom: 40px; }
  .auth-form-title { font-family: 'DM Serif Display', serif; font-size: 36px; margin-bottom: 8px; }
  .auth-form-sub { font-size: 14px; color: var(--muted); font-weight: 300; }
  .auth-form-sub a { color: var(--accent); text-decoration: none; font-weight: 500; }
  .form-group { margin-bottom: 20px; }
  .form-label { display: block; font-size: 13px; font-weight: 500; margin-bottom: 8px; color: var(--ink); }
  .form-input { width: 100%; padding: 12px 16px; border-radius: 6px; border: 1.5px solid var(--border); background: var(--white); font-family: 'DM Sans', sans-serif; font-size: 14px; color: var(--ink); transition: border-color 0.2s, box-shadow 0.2s; outline: none; }
  .form-input:focus { border-color: var(--ink); box-shadow: 0 0 0 3px rgba(15,15,15,0.08); }
  .divider { display: flex; align-items: center; gap: 16px; margin: 24px 0; font-size: 12px; color: var(--muted); }
  .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }
  .alert { padding: 12px 16px; border-radius: 6px; font-size: 13px; margin-bottom: 20px; }
  .alert-error { background: #fef2f2; color: var(--error); border: 1px solid #fecaca; }
  .alert-success { background: #f0fdf4; color: var(--success); border: 1px solid #bbf7d0; }
  .dashboard { display: flex; min-height: 100vh; }
  .sidebar { width: 240px; background: var(--ink); color: var(--white); display: flex; flex-direction: column; position: fixed; top: 0; left: 0; bottom: 0; }
  .sidebar-logo { padding: 24px; font-family: 'DM Serif Display', serif; font-size: 20px; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid rgba(255,255,255,0.08); }
  .sidebar-nav { flex: 1; padding: 24px 16px; display: flex; flex-direction: column; gap: 4px; }
  .sidebar-item { display: flex; align-items: center; gap: 12px; padding: 10px 12px; border-radius: 6px; font-size: 14px; color: rgba(255,255,255,0.6); cursor: pointer; transition: all 0.15s; text-decoration: none; }
  .sidebar-item:hover { background: rgba(255,255,255,0.08); color: var(--white); }
  .sidebar-item.active { background: rgba(200,82,42,0.2); color: var(--white); }
  .sidebar-item svg { width: 16px; height: 16px; flex-shrink: 0; }
  .sidebar-section { font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color: rgba(255,255,255,0.25); padding: 16px 12px 8px; }
  .sidebar-footer { padding: 16px; border-top: 1px solid rgba(255,255,255,0.08); }
  .user-pill { display: flex; align-items: center; gap: 10px; padding: 10px 12px; border-radius: 6px; cursor: pointer; transition: background 0.15s; }
  .user-pill:hover { background: rgba(255,255,255,0.08); }
  .avatar { width: 32px; height: 32px; border-radius: 50%; background: var(--accent); display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 600; color: white; flex-shrink: 0; }
  .user-info { flex: 1; min-width: 0; }
  .user-name { font-size: 13px; font-weight: 500; color: var(--white); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .user-role { font-size: 11px; color: rgba(255,255,255,0.4); }
  .main-content { flex: 1; margin-left: 240px; padding: 40px 48px; background: var(--paper); min-height: 100vh; }
  .page-header { margin-bottom: 40px; }
  .page-title { font-family: 'DM Serif Display', serif; font-size: 32px; margin-bottom: 6px; }
  .page-sub { font-size: 14px; color: var(--muted); font-weight: 300; }
  .stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 32px; }
  .stat-card { background: var(--white); border: 1px solid var(--border); border-radius: 10px; padding: 24px; transition: box-shadow 0.2s; }
  .stat-card:hover { box-shadow: 0 4px 20px rgba(0,0,0,0.07); }
  .stat-card-label { font-size: 12px; font-weight: 500; color: var(--muted); letter-spacing: 0.05em; text-transform: uppercase; margin-bottom: 12px; }
  .stat-card-value { font-family: 'DM Serif Display', serif; font-size: 36px; color: var(--ink); margin-bottom: 6px; }
  .stat-card-delta { font-size: 12px; color: var(--success); font-weight: 500; }
  .content-grid { display: grid; grid-template-columns: 2fr 1fr; gap: 20px; }
  .card { background: var(--white); border: 1px solid var(--border); border-radius: 10px; padding: 28px; }
  .card-title { font-size: 15px; font-weight: 600; margin-bottom: 20px; display: flex; align-items: center; justify-content: space-between; }
  .card-title-action { font-size: 12px; color: var(--accent); cursor: pointer; font-weight: 400; }
  .table { width: 100%; border-collapse: collapse; }
  .table th { font-size: 11px; font-weight: 500; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; padding: 0 0 12px; text-align: left; border-bottom: 1px solid var(--border); }
  .table td { padding: 14px 0; border-bottom: 1px solid var(--border); font-size: 14px; vertical-align: middle; }
  .table tr:last-child td { border-bottom: none; }
  .badge { display: inline-block; padding: 3px 10px; border-radius: 100px; font-size: 11px; font-weight: 500; }
  .badge-pass { background: #e8f5e9; color: var(--success); }
  .badge-fail { background: #fef2f2; color: var(--error); }
  .activity-item { display: flex; align-items: flex-start; gap: 12px; padding: 12px 0; border-bottom: 1px solid var(--border); }
  .activity-item:last-child { border-bottom: none; }
  .activity-dot { width: 8px; height: 8px; border-radius: 50%; margin-top: 5px; flex-shrink: 0; }
  .activity-dot.green { background: var(--success); }
  .activity-dot.red { background: var(--error); }
  .activity-dot.amber { background: #f59e0b; }
  .activity-text { font-size: 13px; line-height: 1.5; }
  .activity-time { font-size: 11px; color: var(--muted); margin-top: 2px; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState } = React;

const Shield = () => (<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" style={{width:'100%',height:'100%'}}><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>);
const BarChart = () => (<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>);
const Globe = () => (<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>);
const Bell = () => (<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>);
const SettingsIcon = () => (<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14M4.93 4.93a10 10 0 0 0 0 14.14"/></svg>);
const LogOut = () => (<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" style={{width:14,height:14,color:'rgba(255,255,255,0.3)'}}><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>);
const Mail = () => (<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>);

const GoogleIcon = () => (
  <svg style={{width:18,height:18,flexShrink:0}} viewBox="0 0 24 24">
    <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
    <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
    <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
    <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
  </svg>
);

const LogoMark = ({ size=32, accent=false }) => (
  <div style={{width:size,height:size,background:accent?'#c8522a':'#0f0f0f',borderRadius:6,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
    <svg width={size*0.56} height={size*0.56} viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
      <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
    </svg>
  </div>
);

const Navbar = ({ onNavigate }) => (
  <nav className="nav">
    <a className="nav-logo" onClick={() => onNavigate('landing')} style={{cursor:'pointer'}}>
      <LogoMark size={32}/> DMARCBridge
    </a>
    <div className="nav-links">
      <a className="nav-link" href="#">Features</a>
      <a className="nav-link" href="#">Docs</a>
      <a className="nav-link" href="#">Pricing</a>
    </div>
    <div className="nav-actions">
      <button className="btn btn-outline" style={{padding:'9px 20px'}} onClick={() => onNavigate('login')}>Log in</button>
      <button className="btn btn-primary" style={{padding:'9px 20px'}} onClick={() => onNavigate('register')}>Get started</button>
    </div>
  </nav>
);

const Landing = ({ onNavigate }) => (
  <div className="landing">
    <Navbar onNavigate={onNavigate}/>
    <section className="hero">
      <div>
        <div className="hero-eyebrow fade-up">Email Authentication</div>
        <h1 className="hero-title fade-up-1">Protect your<br/> domain from<br/> <em>email fraud</em></h1>
        <p className="hero-desc fade-up-2">Monitor DMARC reports, track authentication failures, and enforce email security policies — all from one clean dashboard.</p>
        <div className="hero-actions fade-up-3">
          <button className="btn btn-accent" style={{fontSize:15,padding:'14px 32px'}} onClick={() => onNavigate('register')}>Start for free</button>
          <button className="btn btn-outline" onClick={() => onNavigate('login')}>Sign in</button>
        </div>
      </div>
      <div style={{position:'relative'}} className="fade-up-2">
        <div className="floating-stat top-left"><div className="stat-value">98.4%</div><div className="stat-label">Pass rate today</div></div>
        <div className="hero-card">
          <div className="hero-card-header">
            <span className="hero-card-title">Domain Overview</span>
            <span className="status-badge">● Live</span>
          </div>
          {[{name:'acme.com',meta:'12,430 messages',score:98,cls:''},{name:'mail.acme.com',meta:'3,201 messages',score:76,cls:'warn'},{name:'newsletter.co',meta:'890 messages',score:41,cls:'bad'}].map(d => (
            <div className="domain-row" key={d.name}>
              <div><div className="domain-name">{d.name}</div><div className="domain-meta">{d.meta}</div></div>
              <div className="score-bar">
                <span className="score-num" style={{color:d.cls==='bad'?'#c62828':d.cls==='warn'?'#f59e0b':'#2d6a4f'}}>{d.score}%</span>
                <div className="bar-track"><div className={`bar-fill ${d.cls}`} style={{width:`${d.score}%`}}/></div>
              </div>
            </div>
          ))}
        </div>
        <div className="floating-stat bottom-right"><div className="stat-value">3</div><div className="stat-label">Domains monitored</div></div>
      </div>
    </section>

const Login = ({ onNavigate, onLogin }) => {
  const [email, setEmail] = useState('');
  const [password, setPassword] = useState('');
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState('');

  const handleSubmit = async () => {
    if (!email || !password) { setError('Please fill in all fields'); return; }
    setLoading(true); setError('');
    try {
      const res = await fetch('/auth/login', {
        method: 'POST', credentials: 'include',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({email, password})
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.detail || 'Login failed');
      onLogin(data.email);
    } catch(e) { setError(e.message); }
    finally { setLoading(false); }
  };

  return (
    <div className="auth-page">
      <div className="auth-visual">
        <a className="auth-visual-logo" onClick={() => onNavigate('landing')} style={{cursor:'pointer'}}>
          <div className="auth-visual-logo-mark" style={{width:36,height:36,display:'flex',alignItems:'center',justifyContent:'center'}}><div style={{width:20,height:20,color:'white'}}><Shield/></div></div>
          DMARCBridge
        </a>
        <div className="auth-quote">
          <div className="auth-quote-text">Your domain's reputation,<br/> <em>always protected.</em></div>
          <div className="auth-quote-sub">Real-time DMARC monitoring and enforcement</div>
        </div>
        <div style={{display:'flex',gap:8}}><div className="dot active"/><div className="dot"/><div className="dot"/></div>
      </div>
      <div className="auth-form-panel">
        <div className="auth-form-inner fade-in">
          <div className="auth-form-header">
            <h1 className="auth-form-title">Welcome back</h1>
            <p className="auth-form-sub">Don't have an account? <a onClick={() => onNavigate('register')} style={{cursor:'pointer'}}>Sign up free</a></p>
          </div>
          {error && <div className="alert alert-error">{error}</div>}
          <button className="btn btn-google" onClick={() => window.location.href='/auth/google'}>
            <GoogleIcon/> Continue with Google
          </button>
          <div className="divider">or continue with email</div>
          <div className="form-group">
            <label className="form-label">Email address</label>
            <input className="form-input" type="email" placeholder="you@company.com" value={email} onChange={e => setEmail(e.target.value)} onKeyDown={e => e.key==='Enter' && handleSubmit()}/>
          </div>
          <div className="form-group">
            <label className="form-label" style={{display:'flex',justifyContent:'space-between'}}>
              Password <a href="#" style={{color:'var(--accent)',fontSize:12,fontWeight:400}}>Forgot?</a>
            </label>
            <input className="form-input" type="password" placeholder="••••••••" value={password} onChange={e => setPassword(e.target.value)} onKeyDown={e => e.key==='Enter' && handleSubmit()}/>
          </div>
          <button className="btn btn-primary btn-full" style={{marginTop:8}} onClick={handleSubmit} disabled={loading}>
            {loading ? <><div className="spinner"/>Signing in…</> : 'Sign in'}
          </button>
        </div>
      </div>
    </div>
  );
};

const Register = ({ onNavigate }) => {
  const [form, setForm] = useState({name:'',email:'',password:''});
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState('');
  const [success, setSuccess] = useState(false);
  const set = k => e => setForm(f => ({...f,[k]:e.target.value}));

  const handleSubmit = async () => {
    if (!form.email || !form.password) { setError('Email and password are required'); return; }
    if (form.password.length < 8) { setError('Password must be at least 8 characters'); return; }
    setLoading(true); setError('');
    try {
      const res = await fetch('/auth/register', {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify(form)
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.detail || 'Registration failed');
      setSuccess(true);
      setTimeout(() => onNavigate('login'), 1500);
    } catch(e) { setError(e.message); }
    finally { setLoading(false); }
  };

  return (
    <div className="auth-page">
      <div className="auth-visual">
        <a className="auth-visual-logo" onClick={() => onNavigate('landing')} style={{cursor:'pointer'}}>
          <div className="auth-visual-logo-mark" style={{width:36,height:36,display:'flex',alignItems:'center',justifyContent:'center'}}><div style={{width:20,height:20,color:'white'}}><Shield/></div></div>
          DMARCBridge
        </a>
        <div className="auth-quote">
          <div className="auth-quote-text">Set up DMARC monitoring<br/> in <em>minutes, not days.</em></div>
          <div className="auth-quote-sub">Join teams protecting their email infrastructure</div>
        </div>
        <div style={{display:'flex',flexDirection:'column',gap:12}}>
          {['No credit card required','Free forever plan','Setup in under 5 minutes'].map(t => (
            <div key={t} style={{display:'flex',alignItems:'center',gap:10,fontSize:13,color:'rgba(255,255,255,0.7)'}}>
              <div style={{width:20,height:20,borderRadius:'50%',background:'rgba(200,82,42,0.3)',display:'flex',alignItems:'center',justifyContent:'center',color:'#e8a088',fontSize:10}}>✓</div>
              {t}
            </div>
          ))}
        </div>
      </div>
      <div className="auth-form-panel">
        <div className="auth-form-inner fade-in">
          <div className="auth-form-header">
            <h1 className="auth-form-title">Create account</h1>
            <p className="auth-form-sub">Already have one? <a onClick={() => onNavigate('login')} style={{cursor:'pointer'}}>Sign in</a></p>
          </div>
          {error && <div className="alert alert-error">{error}</div>}
          {success && <div className="alert alert-success">Account created! Redirecting to login…</div>}
          <button className="btn btn-google" onClick={() => window.location.href='/auth/google'}>
            <GoogleIcon/> Sign up with Google
          </button>
          <div className="divider">or sign up with email</div>
          <div className="form-group">
            <label className="form-label">Full name</label>
            <input className="form-input" type="text" placeholder="Jane Smith" value={form.name} onChange={set('name')}/>
          </div>
          <div className="form-group">
            <label className="form-label">Email address</label>
            <input className="form-input" type="email" placeholder="you@company.com" value={form.email} onChange={set('email')}/>
          </div>
          <div className="form-group">
            <label className="form-label">Password</label>
            <input className="form-input" type="password" placeholder="Min. 8 characters" value={form.password} onChange={set('password')} onKeyDown={e => e.key==='Enter' && handleSubmit()}/>
          </div>
          <button className="btn btn-accent btn-full" style={{marginTop:8}} onClick={handleSubmit} disabled={loading||success}>
            {loading ? <><div className="spinner"/>Creating account…</> : 'Create account'}
          </button>
          <p style={{fontSize:12,color:'var(--muted)',marginTop:16,textAlign:'center',lineHeight:1.6}}>
            By signing up you agree to our <a href="#" style={{color:'var(--accent)'}}>Terms</a> and <a href="#" style={{color:'var(--accent)'}}>Privacy Policy</a>
          </p>
        </div>
      </div>
    </div>
  );
};

          ))}

        <div className="content-grid fade-up-2">
          <div className="card">

            <table className="table">
              <thead><tr><th>Domain</th><th>Source IP</th><th>Volume</th><th>SPF</th><th>DKIM</th></tr></thead>
              <tbody>

const App = () => {
  const [page, setPage] = useState('loading');
  const [userEmail, setUserEmail] = useState('');

  React.useEffect(() => {
    fetch('/auth/me', { credentials: 'include' })
      .then(res => res.ok ? res.json() : null)
      .then(data => {
        if (data) { setUserEmail(data.email); setPage('dashboard'); }
        else setPage('landing');
      })
      .catch(() => setPage('landing'));
  }, []);

  const handleLogin = (email) => { setUserEmail(email); setPage('dashboard'); };
  const handleLogout = async () => {
    await fetch('/auth/logout', { method: 'POST', credentials: 'include' });
    setUserEmail(''); setPage('landing');
  };

  if (page==='loading') return (
    <div style={{display:'flex',alignItems:'center',justifyContent:'center',height:'100vh',background:'var(--paper)'}}>
      <div style={{textAlign:'center'}}>
        <div style={{fontFamily:'DM Serif Display,serif',fontSize:24,marginBottom:16}}>DMARCBridge</div>
        <div className="spinner" style={{margin:'0 auto',borderTopColor:'var(--accent)',borderColor:'var(--border)'}}/>
      </div>
    </div>
  );
  if (page==='landing')   return <Landing onNavigate={setPage}/>;
  if (page==='login')     return <Login onNavigate={setPage} onLogin={handleLogin}/>;
  if (page==='register')  return <Register onNavigate={setPage} onLogin={handleLogin}/>;
  if (page==='dashboard') return <Dashboard onLogout={handleLogout} userEmail={userEmail}/>;
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
